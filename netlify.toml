[build]
  publish = "."

# Pretty URLs — /cocktail instead of /cocktail.html
[[redirects]]
  from = "/cocktail"
  to   = "/cocktail.html"
  status = 200

[[redirects]]
  from = "/backoffice"
  to   = "/backoffice.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache assets aggressively, HTML never
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/cocktails.json"
  [headers.values]
    Cache-Control = "no-cache"
